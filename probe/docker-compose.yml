version: "3.8"
services:
  probe:
    image: ghcr.io/rabin-mishra/chronos-dns-probe:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronos-dns-probe
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PROBE_HOST: 0.0.0.0
      PROBE_PORT: 8000
      TARGETS_FILE: targets.json
    ports:
      - "8000:8000"
    volumes:
      - probe_data:/app/data
    restart: unless-stopped

volumes:
  probe_data:
