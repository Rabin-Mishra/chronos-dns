version: "3.8"
services:
  probe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronos-dns-probe
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PROBE_HOST: 0.0.0.0
      PROBE_PORT: 8000
      TARGETS_FILE: targets.json
    ports:
      - "8000:8000"
    volumes:
      - probe_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  probe_data:
