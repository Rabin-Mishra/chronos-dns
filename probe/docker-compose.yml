version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: chronos-dns-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chronos_db}
      POSTGRES_USER: ${POSTGRES_USER:-chronos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-chronos_user} -d $${POSTGRES_DB:-chronos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  probe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronos-dns-probe
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chronos_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chronos_db}
      PROBE_HOST: 0.0.0.0
      PROBE_PORT: 8000
      TARGETS_FILE: targets.json
    ports:
      - "8000:8000"
    volumes:
      - probe_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  probe_data:
