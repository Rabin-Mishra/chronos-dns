name: Chronos-DNS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: "probe/requirements.txt"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r probe/requirements.txt ruff pytest pytest-asyncio

    - name: Run Linter (Ruff)
      run: ruff check .

    - name: Run Tests (pytest)
      working-directory: ./probe
      run: PYTHONPATH=. pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Repository Metadata (Lower Case)
      id: meta
      run: |
        echo "image_name=ghcr.io/${{ github.repository_owner }}/chronos-dns-probe" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./probe
        file: ./probe/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.image_name }}:latest
          ${{ steps.meta.outputs.image_name }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy via SSH and Docker Compose
      env:
        IMAGE: ${{ steps.meta.outputs.image_name }}
        SHA: ${{ github.sha }}
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "echo ${{ secrets.GITHUB_TOKEN }} | \
           docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
           cd /opt/chronos && \
           IMAGE_TAG=${SHA} docker compose pull probe && \
           docker compose up -d --remove-orphans && \
           docker image prune -f"

    - name: Verify Deployment
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "docker compose -f /opt/chronos/docker-compose.yml ps"
